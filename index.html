<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BMW Genius Cloud</title>
  <meta name="apple-mobile-web-app-title" content="BMW Cloud">
  <meta name="application-name" content="BMW Cloud">
  <link rel="apple-touch-icon" href="public/bmw-icon.png">
  <link rel="icon" href="public/bmw-icon.png">
  <link rel="manifest" href="public/manifest.json">
  <style>
    @font-face {
      font-family: 'BMWTypeNext';
      src: url('public/BMWTypeNextKrTT-Thin.ttf') format('truetype');
      font-weight: 100;
      font-display: swap;
    }

    :root {
      --bmw-blue: #0166B1;
      --bmw-dark: #1a1a1a;
      --bmw-gray: #6b6b6b;
      --bmw-border: #e8e8e8;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background-color: #ffffff;
      color: var(--bmw-dark);
      font-family: 'BMWTypeNext', 'Helvetica Neue', Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 24px 34px 0;
      margin-bottom: 56px;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .bmw-logo {
      width: 41px;
      height: 41px;
      object-fit: contain;
    }

    .site-title {
      font-size: 17px;
      font-weight: 400;
      letter-spacing: 0.04em;
      color: var(--bmw-gray);
    }

    nav {
      padding: 0 34px;
      flex: 1;
    }

    .menu-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 24px 0;
      border-bottom: 1px solid var(--bmw-border);
      text-decoration: none;
      color: var(--bmw-dark);
      font-size: 17px;
      font-weight: 100;
      letter-spacing: 0.01em;
      transition: color 0.25s ease;
    }

    .menu-item:first-child {
      border-top: 1px solid var(--bmw-border);
    }

    .menu-item:hover {
      color: var(--bmw-blue);
    }

    .menu-item:hover .menu-arrow {
      transform: translateX(6px);
      color: var(--bmw-blue);
    }

    .menu-arrow {
      font-size: 16px;
      color: #c8c8c8;
      transition: transform 0.25s ease, color 0.25s ease;
    }

    footer {
      padding: 24px 34px;
      font-size: 10px;
      color: #b0b0b0;
      letter-spacing: 0.04em;
      border-top: 1px solid var(--bmw-border);
      margin-top: auto;
    }
  </style>
</head>
<body>

  <header>
    <img src="public/bmw-logo.svg" alt="BMW" class="bmw-logo">
    <p class="site-title">BMWGenius.cloud</p>
  </header>

  <nav>
    <a href="/models" class="menu-item">
      <span>Models</span>
      <span class="menu-arrow">→</span>
    </a>
    <a href="/colors" class="menu-item">
      <span>Colors</span>
      <span class="menu-arrow">→</span>
    </a>
    <a href="/bmw_excellence_club" class="menu-item">
      <span>BMW Excellence Club 3.0+</span>
      <span class="menu-arrow">→</span>
    </a>
  </nav>

  <footer>
    Copyright 2026. BMW Genius Jang Uihwan · Samchully Motors
  </footer>

</body>
</html>
